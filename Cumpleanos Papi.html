<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felicidades Papi 🎁</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff9e6 0%, #ffecd2 50%, #fff0f5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ── Floating background shapes ── */
  .bg-dots {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .dot {
    position: absolute;
    border-radius: 50%;
    opacity: 0.18;
    animation: floatDot linear infinite;
  }

  /* ── Canvas for fireworks ── */
  #fireworks-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* ── Stage ── */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px;
  }

  /* ── Prompt text ── */
  .prompt {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: #e05c8a;
    text-shadow: 2px 2px 0 #ffb3cc, 0 0 20px rgba(224,92,138,0.3);
    animation: promptBounce 1.5s ease-in-out infinite;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }
  .prompt.hidden { opacity: 0; transition: opacity 0.3s; }

  /* ── Gift box container ── */
  .gift-wrap {
    position: relative;
    width: 220px;
    height: 240px;
    cursor: pointer;
    filter: drop-shadow(0 12px 30px rgba(0,0,0,0.18));
  }
  .gift-wrap:not(.opening):hover .gift-lid { transform: translateX(-50%) translateY(-22px) rotate(-6deg); }
  .gift-wrap:not(.opening):hover .bow      { transform: translateX(-50%) translateY(-22px) rotate(-6deg); }

  /* idle wobble */
  .gift-wrap { animation: idleWobble 2.5s ease-in-out infinite; }
  .gift-wrap.opening { animation: none; }

  /* ── Box body ── */
  .gift-box {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 160px;
    background: linear-gradient(160deg, #ff6b6b 0%, #ee4444 100%);
    border-radius: 14px 14px 18px 18px;
    transition: transform 0.2s;
    overflow: visible;
  }
  /* shine stripe */
  .gift-box::after {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 38px; height: 100%;
    background: rgba(255,255,255,0.22);
    border-radius: 0 0 8px 8px;
  }
  /* ribbon horizontal */
  .gift-box::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 34px; transform: translateY(-50%);
    background: #ffe066;
    opacity: 0.9;
  }

  /* ── Lid ── */
  .gift-lid {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 218px; height: 52px;
    background: linear-gradient(160deg, #ff8a80 0%, #ff4444 100%);
    border-radius: 12px;
    transition: transform 0.2s;
    z-index: 5;
    overflow: visible;
  }
  /* lid shine */
  .gift-lid::after {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 38px; height: 100%;
    background: rgba(255,255,255,0.25);
    border-radius: 6px;
  }
  /* lid ribbon stripe */
  .gift-lid::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 38px; height: 100%;
    background: #ffe066;
    opacity: 0.9;
  }

  /* ── Bow ── */
  .bow {
    position: absolute;
    top: -34px; left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 50px;
    z-index: 6;
  }
  .bow-left, .bow-right {
    position: absolute;
    width: 42px; height: 42px;
    background: radial-gradient(circle at 60% 40%, #ffe580, #f5c200);
    border-radius: 50% 0 50% 50%;
    top: 4px;
  }
  .bow-left  { left: 2px;  transform: rotate(-40deg); }
  .bow-right { right: 2px; transform: rotate(40deg) scaleX(-1); }
  .bow-center {
    position: absolute;
    width: 22px; height: 22px;
    background: radial-gradient(circle at 40% 40%, #ffe580, #e6b800);
    border-radius: 50%;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 7;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  /* ── OPENING ANIMATION ── */
  .gift-wrap.opening .gift-lid {
    animation: lidFlyOff 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .gift-wrap.opening .bow {
    animation: bowFlyOff 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .gift-wrap.opening .gift-box {
    animation: boxShake 0.5s ease 0.2s;
  }

  /* ── Card emerging ── */
  .card-emerge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 120%) scale(0.5);
    width: min(88vw, 480px);
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    opacity: 0;
    z-index: 80;
    transition: none;
    pointer-events: none;
  }
  .card-emerge.show {
    animation: cardRise 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
  }
  .card-emerge.show-done {
    opacity: 1;
    transform: translate(-50%, -58%) scale(1) rotate(-2deg);
    pointer-events: all;
  }

  /* ── CTA Link ── */
  .cta-link {
    display: inline-block;
    margin-top: 22px;
    padding: 14px 32px;
    background: linear-gradient(135deg, #ff6b6b, #e91e8c);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    letter-spacing: 0.5px;
    text-decoration: none;
    border-radius: 50px;
    box-shadow: 0 6px 20px rgba(233,30,140,0.4), 0 2px 0 rgba(0,0,0,0.1) inset;
    opacity: 0;
    transform: translateY(20px);
    transition: transform 0.2s, box-shadow 0.2s;
    pointer-events: none;
    position: relative;
    top: 80px;
  }
  .cta-link.show {
    animation: fadeUp 0.6s ease 1.3s forwards;
  }
  .cta-link.show-done {
    opacity: 1; transform: translateY(0); pointer-events: all;
  }
  .cta-link:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 10px 28px rgba(233,30,140,0.5);
  }
  .cta-link:active { transform: scale(0.97); }

  /* ── Escape buttons ── */
  .escape-btn {
    position: fixed;
    padding: 13px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    z-index: 90;
    transition: top 0.18s cubic-bezier(0.22,0.61,0.36,1), left 0.18s cubic-bezier(0.22,0.61,0.36,1);
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }
  .escape-btn.show {
    animation: fadeUp 0.6s ease forwards;
  }
  .escape-btn.show-done {
    opacity: 1;
    pointer-events: all;
  }
  #btn-recibir {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: #1a6644;
  }
  #btn-esperar {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #7a4a00;
  }
  #btn-recibir:hover, #btn-esperar:hover {
    /* movement handled by JS */
  }

  /* ── Floating balloons ── */
  .balloon {
    position: fixed;
    bottom: -120px;
    font-size: 2.8rem;
    animation: riseUp linear infinite;
    pointer-events: none;
    z-index: 1;
  }

  /* ── KEYFRAMES ── */
  @keyframes floatDot {
    0%   { transform: translateY(0) scale(1); opacity: 0.18; }
    50%  { transform: translateY(-30px) scale(1.1); opacity: 0.25; }
    100% { transform: translateY(0) scale(1); opacity: 0.18; }
  }
  @keyframes idleWobble {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    20%       { transform: rotate(-3deg) translateY(-4px); }
    40%       { transform: rotate(3deg) translateY(-8px); }
    60%       { transform: rotate(-2deg) translateY(-4px); }
    80%       { transform: rotate(2deg) translateY(0); }
  }
  @keyframes promptBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  @keyframes lidFlyOff {
    0%   { transform: translateX(-50%) translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-160px) rotate(-25deg); opacity: 0; }
  }
  @keyframes bowFlyOff {
    0%   { transform: translateX(-50%) translateY(0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(-180px) rotate(-35deg) scale(0.5); opacity: 0; }
  }
  @keyframes boxShake {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    20% { transform: translateX(calc(-50% - 6px)) rotate(-2deg); }
    40% { transform: translateX(calc(-50% + 6px)) rotate(2deg); }
    60% { transform: translateX(calc(-50% - 4px)) rotate(-1deg); }
    80% { transform: translateX(calc(-50% + 4px)) rotate(1deg); }
  }
  @keyframes cardRise {
    0%   { opacity: 0; transform: translate(-50%, 120%) scale(0.5); }
    100% { opacity: 1; transform: translate(-50%, -58%) scale(1) rotate(-2deg); }
  }
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes riseUp {
    0%   { transform: translateX(0) translateY(0); opacity: 0.9; }
    20%  { transform: translateX(15px); }
    40%  { transform: translateX(-10px); }
    60%  { transform: translateX(12px); }
    80%  { transform: translateX(-8px); }
    100% { transform: translateX(0) translateY(-110vh); opacity: 0; }
  }
  @keyframes starSpin {
    0%   { transform: rotate(0deg) scale(1); opacity: 1; }
    100% { transform: rotate(360deg) scale(0); opacity: 0; }
  }

  /* ── Stars scattered ── */
  .star-burst {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    font-size: 1.6rem;
    animation: starSpin 1s ease-out forwards;
  }
</style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>
<div class="bg-dots" id="bgDots"></div>

<div class="stage" id="stage">
  <p class="prompt" id="prompt">🎁 ¡Haz clic para abrir tu regalo! 🎁</p>

  <div class="gift-wrap" id="giftWrap" onclick="openGift()">
    <!-- Card (hidden inside) -->
    <img class="card-emerge" id="cardImg" src="uploads/pasted-1777252117987-0.png" alt="Tarjeta de cumpleaños" />

    <!-- Lid -->
    <div class="gift-lid">
      <div class="bow">
        <div class="bow-left"></div>
        <div class="bow-right"></div>
        <div class="bow-center"></div>
      </div>
    </div>

    <!-- Box body -->
    <div class="gift-box"></div>
  </div>

  <a class="cta-link" id="ctaLink" href="#" target="_blank">🚚 Averigua dónde está tu regalo</a>

  <button class="escape-btn" id="btn-recibir">📦 ¡Recibir ya!</button>
  <button class="escape-btn" id="btn-esperar">⏳ Esperar...</button>
</div>

<script>
// ── Background dots ──
const bgDots = document.getElementById('bgDots');
const dotColors = ['#ff6b6b','#ffe066','#6bcaff','#b5f5a0','#ffaad4','#b8a0ff'];
for (let i = 0; i < 28; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  const size = 20 + Math.random() * 50;
  d.style.cssText = `
    width:${size}px; height:${size}px;
    background:${dotColors[Math.floor(Math.random()*dotColors.length)]};
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    animation-duration:${4+Math.random()*6}s;
    animation-delay:${Math.random()*4}s;
  `;
  bgDots.appendChild(d);
}

// ── Balloons ──
const balloonEmojis = ['🎈','🎀','🎊','🎉'];
for (let i = 0; i < 8; i++) {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.textContent = balloonEmojis[Math.floor(Math.random()*balloonEmojis.length)];
  b.style.cssText = `
    left:${5+Math.random()*90}%;
    animation-duration:${7+Math.random()*8}s;
    animation-delay:${Math.random()*6}s;
    font-size:${2+Math.random()*2}rem;
  `;
  document.body.appendChild(b);
}

// ── Fireworks canvas ──
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animating = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createFirework(x, y) {
  const colors = ['#ff6b6b','#ffe066','#6bcaff','#b5f5a0','#ffaad4','#b8a0ff','#ff9f43','#ff6ce5','#00d2ff'];
  const count = 55;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i;
    const speed = 3 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      radius: 3 + Math.random() * 4,
      gravity: 0.08 + Math.random() * 0.06,
      trail: [],
    });
  }
}

function launchFireworks() {
  const positions = [
    [0.2, 0.25], [0.5, 0.15], [0.8, 0.25],
    [0.15, 0.5], [0.85, 0.45], [0.4, 0.08],
    [0.6, 0.3],  [0.5, 0.5],
  ];
  positions.forEach(([rx, ry], i) => {
    setTimeout(() => {
      createFirework(rx * canvas.width, ry * canvas.height);
    }, i * 160);
  });
}

function animateFireworks() {
  if (!animating) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => {
    p.trail.push({x: p.x, y: p.y, alpha: p.alpha});
    if (p.trail.length > 5) p.trail.shift();

    // Draw trail
    p.trail.forEach((t, ti) => {
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.radius * (ti / p.trail.length) * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = t.alpha * 0.3 * (ti / p.trail.length);
      ctx.fill();
    });

    // Draw particle
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();

    // Sparkle
    if (Math.random() > 0.7) {
      ctx.beginPath();
      ctx.arc(p.x + (Math.random()-0.5)*8, p.y + (Math.random()-0.5)*8, 1.5, 0, Math.PI*2);
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = p.alpha * 0.8;
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    p.x += p.vx;
    p.y += p.vy + p.gravity;
    p.vy += p.gravity;
    p.vx *= 0.97;
    p.alpha -= 0.016;
    p.radius *= 0.993;
  });
  requestAnimationFrame(animateFireworks);
}

// ── Star bursts ──
function spawnStars() {
  const emojis = ['⭐','✨','🌟','💫','🎉','🎊'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'star-burst';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left = (10 + Math.random()*80) + '%';
      s.style.top  = (5  + Math.random()*70) + '%';
      s.style.fontSize = (1.2 + Math.random()*1.8) + 'rem';
      s.style.animationDuration = (0.7 + Math.random()*0.8) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 2000);
    }, i * 80);
  }
}

// ── Audio ──
function createAudioCtx() {
  return new (window.AudioContext || window.webkitAudioContext)();
}

function playPartyHorn(ctx, startTime, freq, duration) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const dist = ctx.createWaveShaper();

  // slight distortion for a honky timbre
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) {
    const x = (i * 2) / 256 - 1;
    curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x));
  }
  dist.curve = curve;

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(freq, startTime);
  osc.frequency.linearRampToValueAtTime(freq * 1.08, startTime + duration * 0.3);
  osc.frequency.linearRampToValueAtTime(freq * 0.95, startTime + duration);

  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.28, startTime + 0.04);
  gain.gain.setValueAtTime(0.28, startTime + duration - 0.08);
  gain.gain.linearRampToValueAtTime(0, startTime + duration);

  osc.connect(dist);
  dist.connect(gain);
  gain.connect(ctx.destination);

  osc.start(startTime);
  osc.stop(startTime + duration);
}

function playCrowd(ctx, startTime) {
  // Simulate crowd cheer with filtered noise bursts
  for (let i = 0; i < 6; i++) {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 1.5, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < data.length; j++) data[j] = Math.random() * 2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf;

    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 600 + Math.random() * 1400;
    filter.Q.value = 0.6;

    const gain = ctx.createGain();
    const t = startTime + i * 0.18;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.12 + Math.random() * 0.08, t + 0.1);
    gain.gain.linearRampToValueAtTime(0, t + 1.2);

    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start(t);
    src.stop(t + 1.5);
  }
}

function playWhistle(ctx, startTime) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(2200, startTime);
  osc.frequency.exponentialRampToValueAtTime(3200, startTime + 0.15);
  osc.frequency.exponentialRampToValueAtTime(1800, startTime + 0.45);
  gain.gain.setValueAtTime(0.18, startTime);
  gain.gain.linearRampToValueAtTime(0, startTime + 0.45);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + 0.5);
}

function playOpeningSounds() {
  try {
    const ctx = createAudioCtx();
    const now = ctx.currentTime;

    // Party horns sequence
    const hornFreqs = [523, 659, 784, 1047, 880, 698];
    hornFreqs.forEach((f, i) => {
      playPartyHorn(ctx, now + i * 0.13, f, 0.35);
    });
    // Second horn burst
    [784, 1047, 880].forEach((f, i) => {
      playPartyHorn(ctx, now + 0.9 + i * 0.15, f, 0.4);
    });

    // Whistles
    playWhistle(ctx, now + 0.2);
    playWhistle(ctx, now + 0.65);
    playWhistle(ctx, now + 1.1);

    // Crowd cheer
    playCrowd(ctx, now + 0.1);
    playCrowd(ctx, now + 0.8);
  } catch(e) { console.warn('Audio failed:', e); }
}

// ── Open gift ──
let opened = false;
function openGift() {
  if (opened) return;
  opened = true;

  const wrap  = document.getElementById('giftWrap');
  const card  = document.getElementById('cardImg');
  const link  = document.getElementById('ctaLink');
  const prompt = document.getElementById('prompt');

  // hide prompt
  prompt.classList.add('hidden');

  // trigger CSS opening
  wrap.classList.add('opening');
  wrap.style.cursor = 'default';

  // sounds
  playOpeningSounds();

  // fireworks
  setTimeout(() => {
    animating = true;
    launchFireworks();
    animateFireworks();
    spawnStars();
    // 2nd burst
    setTimeout(() => { launchFireworks(); spawnStars(); }, 700);
    setTimeout(() => { animating = particles.length > 0; }, 5000);
  }, 400);

  // card rises
  card.classList.add('show');
  card.addEventListener('animationend', () => {
    card.classList.add('show-done');
  }, { once: true });

  // escape buttons appear
  const btnRecibir = document.getElementById('btn-recibir');
  const btnEsperar = document.getElementById('btn-esperar');

  function placeBtnsSideBySide() {
    const ctaRect = link.getBoundingClientRect();
    const gap = 14;
    const bw = 160;
    const totalW = bw * 2 + gap;
    const startX = ctaRect.left + ctaRect.width / 2 - totalW / 2;
    const topY = ctaRect.top - 80;

    btnRecibir.style.left  = startX + 'px';
    btnRecibir.style.top   = topY + 'px';
    btnRecibir.style.width = bw + 'px';

    btnEsperar.style.left  = (startX + bw + gap) + 'px';
    btnEsperar.style.top   = topY + 'px';
    btnEsperar.style.width = bw + 'px';
  }

  function escapeBtn(btn) {
    const margin = 20;
    const bw = btn.offsetWidth || 160;
    const bh = btn.offsetHeight || 50;
    const maxX = window.innerWidth  - bw - margin;
    const maxY = window.innerHeight - bh - margin;
    btn.style.left = (margin + Math.random() * maxX) + 'px';
    btn.style.top  = (margin + Math.random() * maxY) + 'px';
    btn.style.transform = 'rotate(' + (Math.random()*16-8) + 'deg) scale(1.08)';
    setTimeout(() => { btn.style.transform = 'rotate(0deg) scale(1)'; }, 250);
  }

  setTimeout(() => {
    placeBtnsSideBySide();

    btnRecibir.classList.add('show');
    btnEsperar.classList.add('show');
    btnRecibir.style.animationDelay = '1.5s';
    btnEsperar.style.animationDelay = '1.7s';

    [btnRecibir, btnEsperar].forEach(btn => {
      btn.addEventListener('animationend', () => btn.classList.add('show-done'), { once: true });
    });

    // Only "Recibir ya" escapes
    btnRecibir.addEventListener('mouseenter', () => escapeBtn(btnRecibir));
    btnRecibir.addEventListener('touchstart', (e) => { e.preventDefault(); escapeBtn(btnRecibir); });

    // "Esperar" works normally — add your action here
    btnEsperar.addEventListener('click', () => {
      btnEsperar.textContent = '😅 ASI ME GUSTAAA, manejando la ansiedad!';
      btnEsperar.style.background = 'linear-gradient(135deg, #a8edea, #fed6e3)';
    });
  }, 800);

  // link appears
  link.classList.add('show');
  link.addEventListener('animationend', () => {
    link.classList.add('show-done');
  }, { once: true });
}
</script>
</body>
</html>
